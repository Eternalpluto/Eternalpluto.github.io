name: Deploy Hexo Blog

on:
  push:
    branches:
      - main  # 或者 master，根据你的默认分支
  # schedule:
  #   - cron: '0 0 * * *'  # 每天自动部署（可选）

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: false  # 如果使用了主题子模块
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'  # 指定 Node.js 版本

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build  # 假设 package.json 中有 build 脚本

      - name: Deploy
        uses: peaceiris/actions-gh-pages@latest
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages  # 部署到 gh-pages 分支